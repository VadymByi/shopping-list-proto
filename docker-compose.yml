version: "3.8"

services:
  # MOBILE APP SERVICE (WEB VERSION)
  app:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - /app/node_modules
    command: npx expo start --web --port 8081
    environment:
      - NODE_ENV=development

  # BACKEND SIMULATOR SERVICE
  server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: npx json-server --watch db.json --host 0.0.0.0 --port 3000
